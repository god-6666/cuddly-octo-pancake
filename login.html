<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录注册 - 校园旧书好物交易交换平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(120deg, #66a3ff, #407bff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container{
            text-align: center;
        }
        .main-title{
            color: #fff;
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .login-box {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .tab-bar {
            display: flex;
        }
        .tab-bar div {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 18px;
            cursor: pointer;
            background: #f7f9fc;
        }
        .tab-bar div.active {
            background: #fff;
            color: #407bff;
            font-weight: bold;
            border-bottom: 3px solid #407bff;
        }
        .form-wrap {
            padding: 30px;
        }
        .input-item {
            margin-bottom: 20px;
        }
        .input-item input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        .input-item input:focus {
            border-color: #407bff;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            height: 48px;
            background: #407bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background: #2563eb;
        }
        .register-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">校园旧书好物交易交换平台</h1>
        <div class="login-box">
            <div class="tab-bar">
                <div class="active" onclick="switchTab('login')">账号登录</div>
                <div onclick="switchTab('register')">新用户注册</div>
            </div>
            <div class="form-wrap">
                <!-- 登录表单 -->
                <div class="login-form">
                    <div class="input-item">
                        <input type="text" placeholder="学号/账号">
                    </div>
                    <div class="input-item">
                        <input type="password" placeholder="登录密码">
                    </div>
                    <button class="submit-btn" onclick="location.href='index.html'">立即登录</button>
                </div>

                <!-- 注册表单 -->
                <div class="register-form">
                    <div class="input-item">
                        <input type="text" placeholder="设置账号">
                    </div>
                    <div class="input-item">
                        <input type="text" placeholder="姓名+学号">
                    </div>
                    <div class="input-item">
                        <input type="password" placeholder="设置密码">
                    </div>
                    <button class="submit-btn">完成注册</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            let loginForm = document.querySelector('.login-form');
            let regForm = document.querySelector('.register-form');
            let tabs = document.querySelectorAll('.tab-bar div');
            if (type === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
    </script>
</body>
</html>

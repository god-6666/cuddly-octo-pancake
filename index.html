<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园旧书好物交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            max-width: 960px;
            margin: 20px auto;
            padding: 0 20px;
        }
        /* 顶部标题 */
        .title-box {
            border: 2px solid #333;
            text-align: center;
            font-size: 36px;
            padding: 20px;
            margin-bottom: 25px;
        }
        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 0;
            margin-bottom: 35px;
        }
        #search-input {
            flex: 1;
            font-size: 24px;
            padding: 10px;
            border: 2px solid #333;
            border-right: none;
        }
        #search-btn {
            font-size: 28px;
            padding: 10px 25px;
            border: 2px solid #333;
            background: #fff;
            cursor: pointer;
        }
        #search-btn:hover {
            background: #f0f0f0;
        }
        /* 热门推荐标题 */
        .recommend-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
        }
        /* 商品网格布局 */
        .goods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .goods-card {
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
        }
        .goods-name {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .img-area {
            height: 220px;
            border: 2px solid #333;
            margin-bottom: 10px;
        }
        .want-text {
            text-align: right;
            font-size: 18px;
        }
        /* 底部导航栏（可点击跳转） */
        .nav-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }
        .nav-item {
            border: 2px solid #333;
            text-align: center;
            font-size: 30px;
            padding: 15px;
            cursor: pointer;
        }
        .nav-item:hover {
            background: #e8f0ff;
        }
    </style>
</head>
<body>
    <!-- 顶部标题 -->
    <div class="title-box">校园旧书好物交易平台</div>

    <!-- 搜索框+搜索按钮 -->
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="输入要查询的物品">
        <button id="search-btn">搜索</button>
    </div>

    <!-- 中间商品区域 -->
    <div class="recommend-title">热门推荐</div>
    <div class="goods-grid">
        <div class="goods-card">
            <div class="goods-name">好物名称</div>
            <div class="img-area"></div>
            <div class="want-text">xx人想要</div>
        </div>
        <div class="goods-card">
            <div class="goods-name">好物名称</div>
            <div class="img-area"></div>
            <div class="want-text">xx人想要</div>
        </div>
        <div class="goods-card">
            <div class="goods-name">好物名称</div>
            <div class="img-area"></div>
            <div class="want-text">xx人想要</div>
        </div>
        <div class="goods-card">
            <div class="goods-name">好物名称</div>
            <div class="img-area"></div>
            <div class="want-text">xx人想要</div>
        </div>
    </div>

    <!-- 底部四个跳转按钮 -->
    <div class="nav-bar">
        <div class="nav-item" onclick="location.href='buy.html'">求购</div>
        <div class="nav-item" onclick="location.href='manage.html'">管理</div>
        <div class="nav-item" onclick="location.href='chat.html'">交流</div>
        <div class="nav-item" onclick="location.href='user.html'">个人</div>
    </div>

    <script>
        // 搜索按钮交互
        document.getElementById('search-btn').addEventListener('click', function(){
            let keyword = document.getElementById('search-input').value;
            if(keyword.trim() !== ''){
                alert("正在搜索：" + keyword);
                // location.href = "search.html?key="+keyword;
            }
        })
    </script>
</body>
</html>
